front:
  text: 靈寶淨明院教師周真公起請畫一此八
  hash: sha256:8b5931a3cb3488f041d04192f451fa016bbfced4a7f8c479d7fbf3708f4d6df5
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0258_HFL_000-001a, image: hfl/0313/0313-142.png}
body:
  text: 方丈上荷六位真師既授以淨明真經經有奧義合叩問玄微庶幾得承演教之意一一詳細批教𦍒甚方丈拜問一經云修吾道者可膺員數參侍玉晨三五飛步篇云三五之法特其要略推而大之其記數不過三五十已問之矣不知步三五時畫綱圖步之或只地上視地形為綱步之此須以足步或以玄綱流演存想而步之玄綱即想至飛步則為圖步之一能事父母天尊降靈居家事父母在朝忠於君方丈父母俱亡止有一弟又在逺處懷終天永感之戚如何應得經法行孝之事奈何為臣孤逺雖有赤忠不得施設為之奈何立身揚名斯為孝矣不尸祿位斯為忠矣隨冝施設孝悌在也一畫服日精夜餐月液如何是服日精與餐月液之法乞賜指教此日月髙奔之道一流金火鈴此是符名唯復是神名是兵將之名乞賜指示南斗錬丹火候使者之名所謂相火一天樞之主是謂道陵乞問如何是道陵道陵天師張監度真諱一該括地象皆其主首如何是地象如何該括望賜詳誨地象八卦之位卦各有宫分一五嶽四海各有其機如何是五嶽四海之機乞賜詳誨此二節言夫血氣𨇠度如心包合漳之義一經云內外之壇統十六將云云各有天樞之節制有在天罡之所部用之之法各有呼召聲隨氣至氣與神交自然見前可以役使如何呼召便肯立至呼召不至時如何十六將雖有考召枷鬼黃頭之稱恐是所職神號未是甚姓名又云各有副將敢問副將之名如何役使呼召使其必至詳乞批誨經中有召淨明神將符未見引上書既見則任意坐以使之一仙梯在目而人不知如何是仙梯在目何以不在於心而在目乞賜旨教仙梯舌也舌不可見而言在目謂內視五臟先見其舌一太上三清空同赤耳空同元始隱諱赤則道君耳則老君一玉皇紫微致逺仲智致逺仲智四字莫便是玉皇紫微隱名隱字否不知是名或是字上二字是甚位下二字是甚位致逺玉皇名仲智紫微名一南北二斗三台所記子辛子寅庚戊丁壬子癸之神方丈所收斗樞祕要金鎖流珠經云太一真人其妻可氏夜夢七色之光生子七人後入白玉洞修行立七名曰可辛可寅可惠可真可憐可戊可庚今淨明經曰子辛子寅子癸而庚戊丁壬不言子言恐是皆合連子字莫便是北斗之神否不知北斗之神衣著服色男子女子乞賜詳誨其下皆稱子衣服有定格如披髮衣白用兵役使神將冠冕則朝真甲胄則衛上帝而二斗皆或男或化現孟叔孟良仲寶仲卿季王季乾莫是南斗之神否或名或字乞詳旨誨端的并男子女人衣著裳服是其隱名上清之衣而變化各有男女無定一三台之中雲育齊京奉良清乞四聖神君既言三台合有三名今却是四聖又名四聖神君不知如何恐脫三台之名四聖者不知是何四聖是北極天蓬真武等四聖否並乞詳批雲育上台名也四聖即天蓬已下四聖一太隂太陽日月尊星其名烜朒其名只兩字莫是太陽名烜太隂名朒否是一五行之辰是以别稱水星名衍火星名熒木星名苖金星名堅土星名鎮方丈得五星真皇君祕名曰北方辰星名啓咺字精原東方歲星名澄瀾字清凝南方熒𤐉星名維停字散融西方太白星名寥陵字振尋中央鎮星名藏陸字耽延與不同何也有真名隱名內名道號各不同隨其文字呼召不必一一生疑一三十二天自恭華搖伯以下八句乃三十二字莫是三十二天否經云此其隱名字載度人不知度人經中何句乃是其字如太黃皇曽天鬱繿玉名上句是字下句是字恐天自是天名帝自是帝名又度人經每天帝句有五字或七字八字者如太釋玉隆騰勝天之類伏乞明賜開折以曉後學之愚昧三十二天此其名如亶婁何薈是內名則鬱繿玉名是字也一二十八宿自清宗立鞠以下共七字二十八字必是二十八宿之名不知清宗立鞠合從甚宿為名字起頭經云此其經是二十八宿為經星五星為緯否二十八宿不動以為經五星周行災福係焉如織有緯文章出焉一五星列照有時化身乞問如何化身化身者為人下降人間如金星之為太白一經云三五飛步流綱之總天英云云是為七變又云三五飛步乃其要略今云三五飛步却為流綱之總元綱流演大與三五不同又方丈收九官三五之步有陽斗隂斗自天英步入天蓬為隂斗自天蓬步入天英為陽斗不知是否呪云斗要妙兮十二辰乘光明兮威武陳云云此自天英出天蓬也又有陽斗呪曰日月明乾坤配斗道光鬼道廢吾從天蓬入天內略過衝輔退反歸却向天禽與心對逢著柱任去英會人道通鬼道礙此自天蓬出天英為陽斗也又云隂斗夏至陽斗冬至今學三五飛步不知用甚呪甚斗人多念得斗要妙兮十二辰一呪或云臨寢步隂斗方上寢牀是夜步隂斗嗽不知是否若出門出行皆便步只以足步為綱不用圖又云有圖不知如何今經云三五飛步不知如何步乞詳以批誨庶正舛誤闕失望賜明旨道生一一生二二生三三自三之後不可得而同矣三五飛步乃元綱之要略也隂陽二呪出入起卧皆用之以足為綱不用圖一經云三甲與六丁此出其宗不知使三甲六丁如何用訣何謂出其宗世有三甲經不真用之不驗六丁亦然望賜詳喻以教後學三甲六丁經中有法役使之道久故可見用意不勤則神不應非法之罪一淨明法云當遇緣合之人望東燒香以問我我許即傳即我是度師汝為保舉之師今有緣合之人八行俱全至誠好道忠孝可傳之人東向燒香以問真師如何知其許傳如何報應也乞賜批教以為準的未敢具表申奏祖師當先以投名狀並保舉狀繳燒以求報應或乞夢或乞四直功曹傳仙旨也此謂已聞見人道成時用如未見則燒保舉狀望東燒香祈夢𥧌而已一帝君諸位神明逐日供養合係皈依上依常式供養帝君遂日合與不合拜禮又有神王直符功曹之類相夾雜在一壇供養莫自帝君神王真官已上合拜傳香使者已下只合皈依頂禮乞賜分别指教經法中自有逐日燒香法曰云云一法云菟掘𤙖符飛治急病不知如何訣目使飛治急病飛者是以火燒飛之如何使符能飛去用何直符持去乞賜詳諭菟掘𤙖即符神名也是火燒之一自度脫六親救治百病符皆可雕印子印否印時存想如書符時如度脫六親符服錬身形符日日服食恐事奪每日書寫不辦救治百病已下三符不日用遇使時旋書莫不須雕印若遇時災瘟疫散施符水請給多時還可用印印否乞一一批誨雕印便於修行養氣者凡淨明符除唾易修摩不可用其他皆可用一靈書中散符名下云念呪或一遍或三遍者唯後只是念散符呪是念靈書三遍呪書揚岐囉囉符云恰訣念呪不知是念靈書三遍或只書念揚岐囉囉一句又諸符多有不説遍數者云念呪書符乞一一批誨只念散符一句在符下者此符是也如是有無遍數者皆七遍看作何用者皆燒方丈伏覩真師批誨慈悲一一遭遇之幸庶使演其真教不為人所難曉然後可以教人不辱方丈拜問靈寶淨明院教師周真公起請畫一終
